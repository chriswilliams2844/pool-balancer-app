<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Balancer</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: #1a1a1a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #status {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 14px;
      color: #b3b3b3;
    }
    #calc {
      width: 100%;
      height: 100vh;
      border: 0;
      display: none;
    }
    .err {
      max-width: 520px;
      padding: 24px;
      text-align: center;
    }
    .err h2 { color: #f87171; font-size: 18px; margin: 0 0 8px 0; }
    .err code { background: #2d2d2d; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
    .err a { color: #60a5fa; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #2d2d2d;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="status">
    <div class="spinner"></div>
    Loading Pool Balancer…
  </div>
  <iframe id="calc" sandbox="allow-scripts allow-forms allow-same-origin allow-modals"></iframe>
  <script>
    // Fetch the calculator HTML from n8n and inject it via srcdoc.
    // This avoids the cross-origin iframe issues that plagued the
    // Monday-native embed widgets — the iframe content is treated as
    // same-origin with this page (which is hosted on our own domain
    // and explicitly trusted by Monday as a custom app).
    const CALCULATOR_URL = 'https://abelomega.app.n8n.cloud/webhook/pool-balancer?token=pb_R7nKxQ9mL2vT4wY8z';

    fetch(CALCULATOR_URL)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(function(html) {
        var iframe = document.getElementById('calc');
        iframe.srcdoc = html;
        iframe.style.display = 'block';
        document.getElementById('status').style.display = 'none';
      })
      .catch(function(e) {
        document.getElementById('status').innerHTML =
          '<div class="err">' +
          '<h2>Couldn\'t load calculator</h2>' +
          '<p>' + (e.message || e) + '</p>' +
          '<p>If this says <code>Failed to fetch</code> or mentions CORS, the n8n webhook needs <code>Allowed Origins</code> set to <code>*</code> in the webhook node options.</p>' +
          '<p><a href="' + CALCULATOR_URL + '" target="_blank" rel="noopener">Open calculator in new tab instead</a></p>' +
          '</div>';
      });
  </script>
</body>
</html>
